<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
        }

        .threshold-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .threshold-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .threshold-label {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .threshold-value {
            font-size: 20px;
            font-weight: bold;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            height: 44px;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 16px;
        }

        .btn-row {
            display: flex;
            gap: 16px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-save {
            background: #2ecc71;
        }

        .btn-refresh {
            background: #3498db;
        }

        /* 表格样式修复 */
        .table-header {
            display: flex;
            background: #3498db;
            color: white;
            padding: 12px 0;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
        }

        .table-row {
            display: flex;
            background: white;
            padding: 14px 0;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .table-row.warn {
            background: #fff1f0;
        }

        .cell {
            flex: 1;
            text-align: center;
            font-size: 15px;
            padding: 0 4px;
        }

        .cell.dev-name {
            flex: 3;
            text-align: left;
            padding-left: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .cell.status {
            flex: 1;
        }

        .device-list {
            max-height: 62vh;
            overflow-y: auto;
            border-radius: 0 0 8px 8px;
            border: 1px solid #eee;
            background: #fff;
        }

        /* 滚动条优化 */
        .device-list::-webkit-scrollbar {
            width: 6px;
        }
        .device-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .warn-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #e74c3c;
            color: white;
            text-align: center;
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
        }

        /* 设备别名输入框 */
        .alias-input {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 15px;
            width: 120px;
        }

        /* 平台设备名只读样式 */
        .platform-name {
            color: #666;
            font-size: 14px;
            user-select: none;
        }

        /* 按钮居中 */
        .btn-center {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        /* 加载提示 */
        .loading-tip {
            text-align: center;
            padding: 10px;
            color: #666;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 加载提示 -->
        <div class="loading-tip" id="loadingTip">🔄 设备数据刷新中...</div>

        <!-- 全局阈值显示 -->
        <div class="card">
            <div class="title">全局统一阈值设置</div>
            <div class="threshold-grid">
                <div class="threshold-item">
                    <div class="threshold-label">温度上限</div>
                    <div class="threshold-value" id="globalUpper1">100</div>
                </div>
                <div class="threshold-item">
                    <div class="threshold-label">温度下限</div>
                    <div class="threshold-value" id="globalLower1">-50</div>
                </div>
                <div class="threshold-item">
                    <div class="threshold-label">转数上限</div>
                    <div class="threshold-value" id="globalUpper2">10000000000</div>
                </div>
                <div class="threshold-item">
                    <div class="threshold-label">转数下限</div>
                    <div class="threshold-value" id="globalLower2">0</div>
                </div>
            </div>
        </div>

        <!-- 设置阈值 -->
        <div class="card">
            <div class="title">设置全局阈值</div>
            <div class="form-row">
                <input id="u1" type="number" placeholder="温度上限">
                <input id="l1" type="number" placeholder="温度下限">
            </div>
            <div class="form-row">
                <input id="u2" type="number" placeholder="转速上限">
                <input id="l2" type="number" placeholder="转速下限">
            </div>
            <div class="btn-center">
                <button class="btn-save" onclick="saveGlobalThreshold()">保存全局阈值</button>
            </div>
        </div>

        <!-- 按钮 -->
        <div class="btn-row">
            <button class="btn-refresh" onclick="refreshAll()">一键刷新全部</button>
        </div>

        <!-- 表头 -->
        <div class="table-header">
            <div class="cell dev-name">设备名称</div>
            <div class="cell">温度</div>
            <div class="cell">转速</div>
            <div class="cell">秒</div>
            <div class="cell">分钟</div>
            <div class="cell">小时</div>
            <div class="cell status">在线状态</div>
            <div class="cell status">报警状态</div>
        </div>

        <!-- 设备列表 -->
        <div class="device-list" id="deviceListBody"></div>

        <!-- 报警提示 -->
        <div class="warn-banner" id="warnBanner" style="display:none;">
            ⚠️ 当前存在设备参数超出全局阈值
        </div>
    </div>

                        { deviceName: "SP299", alias: "设备5", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP299&et=1874377531&method=md5&sign=lWo7vAGPlz%2FDCtojehCRew%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },

                        { deviceName: "SP279", alias: "设备7", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP279&et=1874377622&method=md5&sign=B6PAfZzzauAEuXvk%2BoiO4w%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },

                        { deviceName: "SP239", alias: "设备10", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP239&et=1874377756&method=md5&sign=NQvtnK%2BMRPM1pd9YiPLREw%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },
                        { deviceName: "SP226", alias: "设备11", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP226&et=1874377791&method=md5&sign=J6XQDjjkLrXyBz2Uj61jKQ%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },

                        { deviceName: "SP229", alias: "设备13", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP229&et=1874377880&method=md5&sign=Fmy89latb4VpBzwb0t1uPw%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },
                        { deviceName: "SP244", alias: "设备14", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP244&et=1874377922&method=md5&sign=KajxRCQdHHV6cj5VOYkF%2FA%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },
                        { deviceName: "SP288", alias: "设备15", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP288&et=1874377957&method=md5&sign=scPNEThTdOnr6m754hYdag%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },
                        { deviceName: "SP290", alias: "设备16", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP290&et=1874377993&method=md5&sign=gDHzBO4G7PWLAN3WdMZM1g%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },

                        { deviceName: "SP282", alias: "设备18", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP282&et=1874378066&method=md5&sign=sVsinZloMjAsXf5s4%2BIzYA%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },           
                        {deviceName: "SP342", alias: "设备19", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP342&et=1876793400&method=md5&sign=AftRBo%2B39DluUEBq0HLj0A%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },
                        { deviceName: "SP302", alias: "设备20", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP302&et=1876957262&method=md5&sign=VzMjnlQvTldSy4D%2Fg9DSkQ%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },
                        { deviceName: "SP329", alias: "设备21", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP329&et=1876957307&method=md5&sign=gBR4R24gP%2FnUMXfypfDC3A%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },
                        { deviceName: "SP311", alias: "设备22", productId: "th0Bcjow5r", token: "version=2018-10-31&res=products%2Fth0Bcjow5r%2Fdevices%2FSP311&et=1876957337&method=md5&sign=gMJIXbyeHfj8XDulv4rE9Q%3D%3D", ADC1: 0, ADC2: 0, ADC3: 0, ADC4: 0, ADC5: 0, isWarn: false, online: false },
                        
        ]

        // ================= 配置 =================
        const apiKey = "2TevJ1M7sUvvJWXvG+vz3e21/+cl8f+DBZdTG70zybs="
        let isRefreshing = false

        // ================= 初始化 =================
        window.onload = function () {
            renderDeviceList()
            refreshThresholdUI()
            startAutoPoll()
        }

        // ================= 自动刷新 =================
        function startAutoPoll() {
            fetchAllDevice()
            setInterval(fetchAllDevice, 5000)
        }

        // 显示/隐藏加载
        function setLoading(show) {
            document.getElementById('loadingTip').style.display = show ? 'block' : 'none'
        }

        // ================= 获取所有设备 =================
        async function fetchAllDevice() {
            if (isRefreshing) return
            isRefreshing = true
            setLoading(true)
            
            for (let i = 0; i < deviceList.length; i++) {
                await getOneDeviceData(deviceList[i], i)
            }
            
            isRefreshing = false
            setLoading(false)
            renderDeviceList()
            checkWarnBanner()
        }

        // ================= 获取单个设备 =================
        function getOneDeviceData(dev, idx) {
            return new Promise(resolve => {
                // ================ 这里已经改成你原来 uniapp 一模一样的在线状态判断逻辑 ================
                fetch("https://iot-api.heclouds.com/device/detail?product_id=" + dev.productId + "&device_name=" + dev.deviceName, {
                    method: "GET",
                    headers: {
                        "Authorization": dev.token
                    }
                }).then(res => res.json()).then(res => {
                    try {
                        if (res && res.code === 0 && res.data) {
                            deviceList[idx].online = (res.data.status === 1);
                        } else {
                            deviceList[idx].online = false;
                        }
                    } catch (e) {
                        deviceList[idx].online = false;
                    }
                }).catch(() => {
                    deviceList[idx].online = false;
                })

                // 数据获取（不变）
                fetch(`https://iot-api.heclouds.com/thingmodel/query-device-property?product_id=${dev.productId}&device_name=${dev.deviceName}`, {
                    headers: { "authorization": dev.token }
                }).then(res => res.json()).then(res => {
                    if (res.data) {
                        const f = (key) => {
                            const t = res.data.find(x => x.identifier === key)
                            return t ? Number(t.value) || 0 : 0
                        }
                        deviceList[idx].ADC1 = f("ADC1")
                        deviceList[idx].ADC2 = f("ADC2")
                        deviceList[idx].ADC3 = f("ADC3")
                        deviceList[idx].ADC4 = f("ADC4")
                        deviceList[idx].ADC5 = f("ADC5")
                        deviceList[idx].isWarn = checkWarn(deviceList[idx])
                    }
                    resolve()
                }).catch(() => resolve())
            })
        }

        // ================= 报警判断 =================
        function checkWarn(d) {
            const tempWarn = d.ADC1 > globalUpper1 || d.ADC1 < globalLower1
            const speedWarn = d.ADC2 > globalUpper2 || d.ADC2 < globalLower2
            return tempWarn || speedWarn
        }

        // ================= 保存全局阈值 =================
        function saveGlobalThreshold() {
            const u1 = document.getElementById('u1').value.trim()
            const l1 = document.getElementById('l1').value.trim()
            const u2 = document.getElementById('u2').value.trim()
            const l2 = document.getElementById('l2').value.trim()

            if (u1) globalUpper1 = Number(u1)
            if (l1) globalLower1 = Number(l1)
            if (u2) globalUpper2 = Number(u2)
            if (l2) globalLower2 = Number(l2)

            // 清空输入框
            document.getElementById('u1').value = ''
            document.getElementById('l1').value = ''
            document.getElementById('u2').value = ''
            document.getElementById('l2').value = ''

            refreshThresholdUI()
            // 重新判断报警
            deviceList.forEach((d, i) => {
                deviceList[i].isWarn = checkWarn(d)
            })
            renderDeviceList()
            checkWarnBanner()
            alert('✅ 全局阈值已保存')
        }

        // ================= 刷新阈值显示 =================
        function refreshThresholdUI() {
            document.getElementById('globalUpper1').innerText = globalUpper1
            document.getElementById('globalLower1').innerText = globalLower1
            document.getElementById('globalUpper2').innerText = globalUpper2
            document.getElementById('globalLower2').innerText = globalLower2
        }

        // 更新设备别名
        function updateAlias(index, value) {
            deviceList[index].alias = value
        }

        // ================= 渲染设备列表 =================
        function renderDeviceList() {
            const body = document.getElementById('deviceListBody')
            let html = ''
            deviceList.forEach((item, idx) => {
                const warnClass = item.isWarn ? 'warn' : ''
                const onlineText = item.online ? '✅ 在线' : '❌ 离线'
                const onlineColor = item.online ? '#27ae60' : '#e74c3c'
                const warnText = item.isWarn ? '⚠️ 超限' : '✅ 正常'
                const warnColor = item.isWarn ? '#e74c3c' : '#27ae60'

                html += `
                <div class="table-row ${warnClass}">
                    <div class="cell dev-name">
                        <input class="alias-input" value="${item.alias}" oninput="updateAlias(${idx}, this.value)" />
                        <span class="platform-name">(${item.deviceName})</span>
                    </div>
                    <div class="cell">${item.ADC1}</div>
                    <div class="cell">${item.ADC2}</div>
                    <div class="cell">${item.ADC3}</div>
                    <div class="cell">${item.ADC4}</div>
                    <div class="cell">${item.ADC5}</div>
                    <div class="cell status" style="color:${onlineColor}">${onlineText}</div>
                    <div class="cell status" style="color:${warnColor}">${warnText}</div>
                </div>`
            })
            body.innerHTML = html
        }

        // ================= 报警条 =================
        function checkWarnBanner() {
            const hasWarn = deviceList.some(d => d.isWarn)
            document.getElementById('warnBanner').style.display = hasWarn ? 'block' : 'none'
        }

        // ================= 手动刷新 =================
        function refreshAll() {
            fetchAllDevice()
        }
    </script>
</body>
</html>
